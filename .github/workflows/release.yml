name: release

# Build cross-platform binaries on a version tag and attach them (plus a
# SHA256SUMS file) to the GitHub Release. Asset names match install.sh:
#   jetder-mcp_<os>_<arch>   (os: linux|darwin, arch: amd64|arm64)
#   mcp-deploy_<os>_<arch>   (the CI deploy helper)
#   SHA256SUMS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create/upload the GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          set -eu
          mkdir -p dist
          # Stamp the release tag into the server version so serverInfo.version
          # always matches the published tag (no drift from the source default).
          VERSION="${GITHUB_REF_NAME}"
          # main server binary
          go build -trimpath -ldflags="-s -w -X main.serverVersion=${VERSION}" \
            -o "dist/jetder-mcp_${GOOS}_${GOARCH}" .
          # CI deploy helper
          go build -trimpath -ldflags="-s -w" \
            -o "dist/mcp-deploy_${GOOS}_${GOARCH}" ./scripts/mcp-deploy

      # Build a Claude Desktop .mcpb bundle for macOS only (the manifest declares
      # compatibility.platforms = ["darwin"]). A .mcpb is a zip of manifest.json +
      # server/<binary>; the version is injected from the tag. No secret is bundled —
      # the env uses ${user_config.*} placeholders the user fills in Claude Desktop.
      - name: Build .mcpb bundle (macOS)
        if: matrix.os == 'darwin'
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"   # strip leading v for the manifest version
          work="$(mktemp -d)"
          mkdir -p "${work}/server"
          cp "dist/jetder-mcp_${GOOS}_${GOARCH}" "${work}/server/jetder-mcp"
          chmod +x "${work}/server/jetder-mcp"
          # Inject the release version into the manifest, then validate it.
          python3 - "$VERSION" "mcpb/manifest.json" "${work}/manifest.json" <<'PY'
          import json, sys
          version, src, dst = sys.argv[1], sys.argv[2], sys.argv[3]
          m = json.load(open(src))
          m["version"] = version
          for k in ("manifest_version", "name", "version", "description", "author", "server"):
              assert k in m, f"manifest missing required field: {k}"
          assert m["manifest_version"] == "0.4", m["manifest_version"]
          assert m["server"]["type"] == "binary"
          json.dump(m, open(dst, "w"), indent=2)
          PY
          ( cd "$work" && zip -r -q "bundle.mcpb" manifest.json server/ )
          cp "${work}/bundle.mcpb" "dist/jetder-mcp_${GOOS}_${GOARCH}.mcpb"
          # Sanity: the bundle must contain manifest.json + server/jetder-mcp and no real token.
          unzip -l "dist/jetder-mcp_${GOOS}_${GOARCH}.mcpb"
          unzip -p "dist/jetder-mcp_${GOOS}_${GOARCH}.mcpb" manifest.json | grep -q '${user_config.jetder_token}'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -eu
          cd dist
          # Include the .mcpb bundles in the checksums alongside the bare binaries.
          sha256sum jetder-mcp_* mcp-deploy_* > SHA256SUMS
          cat SHA256SUMS

      - name: Create / update the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/jetder-mcp_*
            dist/mcp-deploy_*
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
